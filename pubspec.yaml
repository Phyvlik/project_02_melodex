name: vibzcheck
description: "Vibzcheck - collaborative music app where groups vote on the next song together."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase core and services
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3

  # State management
  provider: ^6.1.2

  # HTTP and API calls for Spotify integration
  http: ^1.2.2
  dio: ^5.7.0

  # Local caching and secure storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Image caching for Spotify album art
  cached_network_image: ^3.4.1

  # UI utilities
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  fluttertoast: ^8.2.8
  timeago: ^3.7.0

  # Unique ID generation for rooms and documents
  uuid: ^4.5.1

  # Open Spotify deep links
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
